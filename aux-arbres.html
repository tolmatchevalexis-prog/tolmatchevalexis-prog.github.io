  <style>
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #111111;
      line-height: 1.6;
      position: relative;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 72px 30px 120px;
    }

    nav,
    h1,
    .intro,
    .back-link,
    .drawing-label,
    .reset-button {
      font-family: Arial, Helvetica, sans-serif;
    }

    p,
    .section-subtitle {
      font-family: "Newsreader", Georgia, serif;
      font-optical-sizing: auto;
      font-weight: 400;
    }

    nav {
      margin-bottom: 78px;
      font-size: 13px;
      letter-spacing: 0.04em;
    }

    nav a {
      color: #111111;
      text-decoration: none;
      margin-right: 18px;
      transition: color 0.2s ease;
    }

    nav a:hover {
      color: #ff6600;
      text-decoration: underline;
    }

    h1 {
      font-size: 28px;
      line-height: 1.02;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin: 0 0 18px 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    .intro {
      font-size: 17px;
      line-height: 1.35;
      margin: 0 0 34px 0;
      max-width: 720px;
    }

    .header-rule {
      width: 140px;
      height: 1px;
      background: #d4dddd;
      margin: 0 0 64px 0;
    }

    .text-block {
      padding-top: 18px;
      border-top: 1px solid #d4dddd;
      margin: 0 0 56px 0;
    }

    .section-subtitle {
      font-size: 20px;
      line-height: 1.35;
      margin: 0 0 24px 0;
      max-width: 700px;
    }

    p {
      font-size: 19px;
      line-height: 1.5;
      margin: 0 0 14px 0;
      max-width: 700px;
      text-align: justify;
      hyphens: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 100px));
      gap: 10px;
      justify-content: start;
      margin-top: 24px;
    }

    .tile {
      position: relative;
      width: 100px;
      height: 100px;
      overflow: hidden;
      border: none;
      padding: 0;
      margin: 0;
      background: #eef3f3;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.2s ease;
    }

    .tile:hover {
      transform: scale(0.98);
      opacity: 0.96;
    }

    .tile:focus-visible {
      outline: 2px solid #111111;
      outline-offset: 2px;
    }

    .tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(5);
      transform-origin: var(--focus-x, 50%) var(--focus-y, 50%);
      transition: opacity 0.2s ease;
    }

    .tile::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(238, 243, 243, 0.58);
      pointer-events: none;
      transition: background 0.2s ease;
    }

    .tile.seen {
      background: #ff6600;
    }

    .tile.seen img {
      opacity: 0;
    }

    .tile.seen::after {
      background: transparent;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.98);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 9999;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      max-width: 100%;
    }

    .lightbox-drawing {
      width: min(92vw, 900px);
      max-height: 78vh;
      height: auto;
      display: block;
      cursor: pointer;
      background: #ffffff;
      box-shadow: 0 0 0 1px rgba(17, 17, 17, 0.08);
    }

    .drawing-label {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #111111;
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 14px;
      margin-top: 24px;
    }

    .reset-button,
    .back-link {
      display: inline-block;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      color: #111111;
      border: none;
      border-bottom: 1px solid #111111;
      padding: 0 0 2px 0;
      background: none;
      cursor: pointer;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .reset-button:hover,
    .back-link:hover {
      color: #ff6600;
      border-bottom-color: #ff6600;
    }

    #traceur-page {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #111111;
      pointer-events: none;
      z-index: 200;
      transform: translate(-50%, -50%);
      display: none;
    }

    @media (max-width: 700px) {
      .container {
        padding: 44px 18px 88px;
      }

      nav {
        margin-bottom: 56px;
        font-size: 12px;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 14px;
      }

      .intro {
        font-size: 15px;
        line-height: 1.3;
        margin-bottom: 28px;
      }

      .header-rule {
        margin-bottom: 44px;
      }

      .section-subtitle {
        font-size: 19px;
        line-height: 1.3;
        margin-bottom: 18px;
      }

      p {
        font-size: 18px;
        line-height: 1.45;
        text-align: justify;
        hyphens: auto;
      }

      .grid {
        gap: 8px;
      }

      .tile {
        width: 100px;
        height: 100px;
      }
    }
  </style>
</head>
<body>
  <div id="traceur-page" aria-hidden="true"></div>

  <div class="container">
    <nav>
      <a href="index.html">Accueil</a>
      <a href="presentation.html">Présentation</a>
      <a href="parcours.html">Parcours</a>
      <a href="arts-visuels.html">Arts visuels</a>
      <a href="ecriture.html">Écriture</a>
      <a href="contact.html">Contact</a>
    </nav>

    <header>
      <h1>Aux arbres</h1>
      <p class="intro">
        Dessins.
      </p>
      <div class="header-rule"></div>
    </header>

    <section class="text-block">
      <p class="section-subtitle">
        Aux arbres
      </p>

      <div class="grid" id="drawing-grid-arbres"></div>

      <div class="controls">
        <button class="reset-button" id="reset-drawings" type="button">
          Réinitialiser la grille
        </button>

        <a class="back-link" href="dessins.html">Retour à Dessins</a>
      </div>
    </section>
  </div>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lightbox-inner">
      <img class="lightbox-drawing" id="lightbox-drawing" src="" alt="">
      <div class="drawing-label" id="drawing-label">Dessin</div>
    </div>
  </div>

  <script>
    function fixedPosition(seed) {
      const x = 12 + ((seed * 37) % 77);
      const y = 12 + ((seed * 53) % 77);
      return [x + "%", y + "%"];
    }

    const arbresDrawings = Array.from({ length: 30 }, (_, index) => {
      const number = String(index + 1).padStart(2, "0");
      const [x, y] = fixedPosition(index + 101);
      return {
        id: "arbres-" + number,
        label: "Aux arbres " + number,
        file: "arbres-" + number + ".jpg",
        x,
        y
      };
    });

    const lightbox = document.getElementById("lightbox");
    const lightboxDrawing = document.getElementById("lightbox-drawing");
    const drawingLabel = document.getElementById("drawing-label");
    const resetButton = document.getElementById("reset-drawings");
    const storageKey = "alexis-aux-arbres-seen-v1";
    const traceur = document.getElementById("traceur-page");

    function getSeenDrawings() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) || [];
      } catch (e) {
        return [];
      }
    }

    function saveSeenDrawings(seen) {
      localStorage.setItem(storageKey, JSON.stringify(seen));
    }

    function markAsSeen(id, button) {
      const seen = getSeenDrawings();
      if (!seen.includes(id)) {
        seen.push(id);
        saveSeenDrawings(seen);
      }
      button.classList.add("seen");
    }

    const seenDrawings = getSeenDrawings();

    function buildGrid(containerId, items) {
      const container = document.getElementById(containerId);

      items.forEach((drawing) => {
        const button = document.createElement("button");
        button.className = "tile";
        button.type = "button";
        button.setAttribute("aria-label", "Ouvrir " + drawing.label);
        button.dataset.id = drawing.id;
        button.style.setProperty("--focus-x", drawing.x);
        button.style.setProperty("--focus-y", drawing.y);

        if (seenDrawings.includes(drawing.id)) {
          button.classList.add("seen");
        }

        const img = document.createElement("img");
        img.src = drawing.file;
        img.alt = "Détail de " + drawing.label;

        button.appendChild(img);

        button.addEventListener("click", () => {
          markAsSeen(drawing.id, button);
          lightboxDrawing.src = drawing.file;
          lightboxDrawing.alt = drawing.label;
          drawingLabel.textContent = drawing.label;
          lightbox.classList.add("open");
          lightbox.setAttribute("aria-hidden", "false");
        });

        container.appendChild(button);
      });
    }

    buildGrid("drawing-grid-arbres", arbresDrawings);

    resetButton.addEventListener("click", () => {
      localStorage.removeItem(storageKey);
      document.querySelectorAll(".tile.seen").forEach((tile) => {
        tile.classList.remove("seen");
      });
    });

    function closeLightbox() {
      lightbox.classList.remove("open");
      lightbox.setAttribute("aria-hidden", "true");
      lightboxDrawing.src = "";
      lightboxDrawing.alt = "";
    }

    lightbox.addEventListener("click", function (event) {
      if (event.target === lightbox || event.target === lightboxDrawing) {
        closeLightbox();
      }
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        closeLightbox();
      }
    });

    function placerTraceur(pageX, pageY) {
      traceur.style.left = pageX + "px";
      traceur.style.top = pageY + "px";
      traceur.style.display = "block";
    }

    let mouseStopTimer = null;
    let lastMouseX = 0;
    let lastMouseY = 0;

    document.addEventListener("mousemove", function (event) {
      lastMouseX = event.pageX;
      lastMouseY = event.pageY;

      clearTimeout(mouseStopTimer);
      mouseStopTimer = setTimeout(function () {
        placerTraceur(lastMouseX, lastMouseY);
      }, 120);
    });

    document.addEventListener("touchend", function (event) {
      const touch = event.changedTouches[0];
      if (touch) {
        placerTraceur(touch.pageX, touch.pageY);
      }
    }, { passive: true });
  </script>
</body>
</html>
