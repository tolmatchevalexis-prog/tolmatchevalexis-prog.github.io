  <style>
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #111111;
      line-height: 1.6;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 72px 30px 120px;
    }

    nav,
    h1,
    h2,
    .contact-link,
    .social-link {
      font-family: Arial, Helvetica, sans-serif;
    }

    p {
      font-family: "Newsreader", Georgia, serif;
      font-optical-sizing: auto;
      font-weight: 400;
    }

    nav {
      margin-bottom: 78px;
      font-size: 13px;
      letter-spacing: 0.04em;
    }

    nav a {
      color: #111111;
      text-decoration: none;
      margin-right: 18px;
      transition: color 0.2s ease;
    }

    nav a:hover {
      color: #ff6600;
      text-decoration: underline;
    }

    h1 {
      font-size: 28px;
      line-height: 1.02;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin: 0 0 18px 0;
    }

    .header-rule {
      width: 140px;
      height: 1px;
      background: #d4dddd;
      margin: 0 0 64px 0;
    }

    .video-block {
      margin: 0 0 40px 0;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 9 / 16;
      background: #eef3f3;
      overflow: hidden;
    }

    .video-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .card {
      background: #eef3f3;
      padding: 40px 34px 34px 34px;
    }

    h2 {
      font-size: 14px;
      font-weight: 700;
      margin: 0 0 14px 0;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    p {
      font-size: 19px;
      line-height: 1.5;
      margin: 0;
      max-width: 660px;
      text-align: justify;
      hyphens: auto;
    }

    .contact-link,
    .social-link {
      display: inline-block;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      color: #111111;
      border-bottom: 1px solid #111111;
      padding-bottom: 2px;
      transition: color 0.2s ease, border-color 0.2s ease;
      margin: 0 0 12px 0;
    }

    .contact-link:hover,
    .social-link:hover {
      color: #ff6600;
      border-bottom-color: #ff6600;
    }

    .social-list {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }

    a {
      color: #111111;
      transition: color 0.2s ease;
    }

    a:hover {
      color: #ff6600;
    }

    @media (max-width: 700px) {
      .container {
        padding: 44px 18px 88px;
      }

      nav {
        margin-bottom: 56px;
        font-size: 12px;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 14px;
      }

      .header-rule {
        margin-bottom: 44px;
      }

      .video-block {
        margin-bottom: 28px;
      }

      .card {
        padding: 24px 18px 20px 18px;
      }

      h2 {
        font-size: 13px;
      }

      p {
        font-size: 18px;
        line-height: 1.45;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="index.html">Accueil</a>

      <a href="ecriture.html">Écriture</a>
      <a href="contact.html">Contact</a>
    </nav>

    <header>
      <h1>Contact</h1>
      <div class="header-rule"></div>
    </header>

    <section class="video-block">
      <div class="video-wrapper">
        <iframe
          src="https://www.youtube.com/embed/W5qx7dAhO1Q"
          title="Vidéo YouTube"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>
      </div>
    </section>

    <div class="cards">
      <section class="card">
        <h2>Mail</h2>
        <a class="contact-link" href="mailto:tolmatchev.alexis@gmail.com">tolmatchev.alexis@gmail.com</a>
      </section>

      <section class="card">
        <h2>Réseaux sociaux</h2>
        <div class="social-list">
          <a class="social-link" href="https://alexistolmatchev.substack.com/" target="_blank" rel="noopener noreferrer">Substack : Journal d’atelier</a>
          <a class="social-link" href="https://www.instagram.com/alexistolmatchev/" target="_blank" rel="noopener noreferrer">Instagram</a>
          <a class="social-link" href="https://www.flickr.com/photos/atkcustom66" target="_blank" rel="noopener noreferrer">Flickr : Lab a</a>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
